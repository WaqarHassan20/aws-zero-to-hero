AWSTemplateFormatVersion: '2010-09-09'
Description: Minimal EC2 instance

Resources:
  MyEC2Instance:
    Type: AWS::EC2::Instance
    Properties:
      ImageId: ami-0c55b159cbfafe1f0   # Replace with valid AMI for your region
      InstanceType: t2.micro
      KeyName: "./my-keypair file path"    # Replace with your key pair
      SecurityGroupIds:
        - Ref: MySecurityGroup

  MySecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Allow SSH access
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 22
          ToPort: 22
          CidrIp: 0.0.0.0/0